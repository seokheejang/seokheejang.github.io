<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Multi-chain RPC Fleet — Mock Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: #0f1419;
    color: #e6e6e6;
    padding: 2rem;
    min-height: 100vh;
  }
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid #1f2937;
  }
  h1 {
    font-size: 1.5rem;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .subtitle {
    color: #9ca3af;
    font-size: 0.875rem;
    margin-top: 0.25rem;
  }
  .refresh-btn {
    background: #1f2937;
    color: #e6e6e6;
    border: 1px solid #374151;
    padding: 0.5rem 1rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.875rem;
    transition: all 0.15s;
  }
  .refresh-btn:hover { background: #374151; }
  .refresh-btn:active { transform: scale(0.97); }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1rem;
  }
  .card {
    background: #161b22;
    border: 1px solid #1f2937;
    border-radius: 8px;
    padding: 1.25rem;
    transition: border-color 0.15s;
  }
  .card:hover { border-color: #374151; }
  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
  }
  .chain-name {
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 0.375rem;
    padding: 0.25rem 0.625rem;
    border-radius: 999px;
    font-size: 0.75rem;
    font-weight: 500;
  }
  .badge-healthy { background: rgba(34, 197, 94, 0.1); color: #4ade80; }
  .badge-warn { background: rgba(250, 204, 21, 0.1); color: #facc15; }
  .badge-degraded { background: rgba(239, 68, 68, 0.1); color: #f87171; }
  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: currentColor;
  }
  .metric-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.5rem 0;
    border-bottom: 1px solid #1a2028;
    font-size: 0.875rem;
  }
  .metric-row:last-child { border-bottom: none; }
  .metric-label {
    color: #9ca3af;
  }
  .metric-value {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-weight: 500;
  }
  .footer {
    margin-top: 2rem;
    padding-top: 1rem;
    border-top: 1px solid #1f2937;
    color: #6b7280;
    font-size: 0.75rem;
    text-align: center;
  }
  .footer code {
    background: #1f2937;
    padding: 0.125rem 0.375rem;
    border-radius: 4px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    color: #9ca3af;
  }
</style>
</head>
<body>
  <div class="header">
    <div>
      <h1>🐳 Multi-chain RPC Fleet</h1>
      <div class="subtitle">Mock dashboard — sample HTML artifact embedded in the blog</div>
    </div>
    <button class="refresh-btn" onclick="refresh()">↻ Refresh</button>
  </div>

  <div class="grid" id="fleet"></div>

  <div class="footer">
    Demo data. Generated at <span id="ts"></span>. Source: <code>public/artifacts/2026-05-rpc-fleet-mock.html</code>
  </div>

<script>
  const chains = [
    { name: "eth-mainnet", client: "geth + lighthouse", nodes: 1 },
    { name: "op-mainnet",  client: "op-geth + op-node",  nodes: 20 },
    { name: "arb1",        client: "nitro",              nodes: 2 },
    { name: "hp",          client: "nitro",              nodes: 14 },
    { name: "ault",        client: "—",                  nodes: 2 },
  ];

  function rand(min, max, decimals = 0) {
    const v = Math.random() * (max - min) + min;
    return decimals === 0 ? Math.floor(v) : parseFloat(v.toFixed(decimals));
  }

  function statusFromLatency(ms) {
    if (ms < 80) return { cls: "badge-healthy", text: "healthy" };
    if (ms < 200) return { cls: "badge-warn", text: "warn" };
    return { cls: "badge-degraded", text: "degraded" };
  }

  function render() {
    const fleet = document.getElementById("fleet");
    fleet.innerHTML = "";
    chains.forEach(c => {
      const block = rand(20000000, 22000000);
      const peers = rand(8, 64);
      const latency = rand(20, 350);
      const sync = rand(99.4, 100, 2);
      const status = statusFromLatency(latency);
      const html = `
        <div class="card">
          <div class="card-header">
            <div>
              <div class="chain-name">${c.name}</div>
              <div class="subtitle" style="margin-top:0.125rem;">${c.client} · ${c.nodes} node${c.nodes > 1 ? "s" : ""}</div>
            </div>
            <span class="badge ${status.cls}"><span class="dot"></span>${status.text}</span>
          </div>
          <div class="metric-row">
            <span class="metric-label">Block</span>
            <span class="metric-value">${block.toLocaleString()}</span>
          </div>
          <div class="metric-row">
            <span class="metric-label">Sync</span>
            <span class="metric-value">${sync}%</span>
          </div>
          <div class="metric-row">
            <span class="metric-label">Peers</span>
            <span class="metric-value">${peers}</span>
          </div>
          <div class="metric-row">
            <span class="metric-label">RPC p95</span>
            <span class="metric-value">${latency}ms</span>
          </div>
        </div>
      `;
      fleet.insertAdjacentHTML("beforeend", html);
    });
    document.getElementById("ts").textContent = new Date().toLocaleString();
  }

  function refresh() { render(); }

  render();
</script>
</body>
</html>
